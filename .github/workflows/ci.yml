name: CI
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/workbench/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/bioapi/requirements.txt
      - run: npm ci
        working-directory: frontend/workbench
      - run: npm run typecheck
        working-directory: frontend/workbench
      - run: npm run build
        working-directory: frontend/workbench
      - run: npm audit --audit-level=moderate
        working-directory: frontend/workbench
      - run: python -m pip install -r requirements.txt
        working-directory: backend/bioapi
      - run: python -m pytest
        working-directory: backend/bioapi

